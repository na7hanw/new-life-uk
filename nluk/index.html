<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="description" content="Free multilingual guide for refugees, asylum seekers, and immigrants arriving in the UK. Step-by-step guides in 12 languages." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.ingest.sentry.io; object-src 'none'; base-uri 'self'; form-action 'self';">
  <!-- style-src 'unsafe-inline' is required for React inline styles and is isolated from script-src which remains strict -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    /* Critical pre-render styles — shown before JS executes, matching the app shell layout */
    .nluk-pre{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:16px 20px;background:#F5F1EB;border-bottom:1px solid #DDD7CF;border-radius:0 0 22px 22px;z-index:300}
    .nluk-pre-row{display:flex;align-items:center;gap:10px}
    .nluk-pre-title{font-size:1.05rem;font-weight:800;font-family:system-ui,-apple-system,sans-serif;color:#1A1410;margin:0}
  </style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>New Life UK — Free Survival Guide</title>
</head>
<body>
  <div id="root">
    <!--pre-render: shown before JS executes to give early FCP/LCP-->
    <div class="nluk-pre">
      <div class="nluk-pre-row">
        <svg width="28" height="28" viewBox="0 0 28 28" aria-hidden="true"><circle cx="14" cy="14" r="14" fill="#0A5F3E"/><text x="14" y="19" text-anchor="middle" font-size="14" fill="white">🌱</text></svg>
        <h1 class="nluk-pre-title">New Life UK</h1>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
