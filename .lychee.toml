# Lychee broken link checker config
exclude = [
  "localhost",
  "127.0.0.1",
  "0.0.0.0",
  "example.com",
  "mailto:",
]

# Accept these HTTP status codes as valid
accept = [200, 206, 301, 302, 307, 308]

# Timeout per request in seconds
timeout = 20

# Max retries per link
max_retries = 3

# User agent
user_agent = "lychee/0.15"
