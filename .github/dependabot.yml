version: 2

updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/nluk"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 10
    groups:
      vite-ecosystem:
        patterns:
          - "vite*"
          - "@vitejs/*"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "react-*"
      vitest-ecosystem:
        patterns:
          - "vitest"
          - "@vitest/*"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-development: "chore(dev)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
