name: Auto-Translate Content

on:
  push:
    branches: [main]
    paths:
      - 'nluk/src/data/guides.ts'
  workflow_dispatch:
    inputs:
      langs:
        description: 'Languages to translate (comma-separated, e.g. ar,fr,pl). Leave blank for all.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print only, no commit)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Translate missing content
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nluk/package-lock.json

      - name: Install dependencies
        working-directory: nluk
        run: npm ci

      - name: Run auto-translate
        working-directory: nluk
        env:
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          TRANSLATE_LANGS: ${{ github.event.inputs.langs || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node --input-type=module --experimental-vm-modules scripts/auto-translate.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet nluk/src/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request with translations
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'i18n: auto-translate missing guide translations'
          branch: 'auto-translate/update-translations'
          delete-branch: true
          title: '🌍 Auto-translate: fill in missing language translations'
          body: |
            ## Automated Translation Update

            This PR was generated automatically by the [Auto-Translate workflow](.github/workflows/auto-translate.yml).

            ### What changed
            Missing language translations in `nluk/src/data/guides.ts` were auto-filled using:
            - **Google Cloud Translation** (if API key is set) — highest quality, supports all 12 languages including Tigrinya and Oromo
            - **MyMemory API** (free tier fallback) — good quality for 10 languages

            ### Languages
            All 11 non-English languages supported by the app:
            Arabic · Persian · Urdu · Amharic · Tigrinya · Somali · Oromo · Ukrainian · Romanian · Polish · French

            ### Review guidance
            - Machine translations are a good starting point but should ideally be reviewed by native speakers
            - The [i18n-check workflow](/.github/workflows/i18n-check.yml) ensures all guides have complete English content
            - To improve a translation, edit the relevant string in `guides.ts` and submit a new PR
            - Consider sharing this repo with community members who speak these languages via [GitLocalize](https://gitlocalize.com)

            ### How to add a Google Translate API key (for Tigrinya/Oromo + higher quality)
            1. Go to [Google Cloud Console](https://console.cloud.google.com) → Enable "Cloud Translation API"
            2. Create an API key (free 500k chars/month)
            3. Add as `GOOGLE_TRANSLATE_API_KEY` in GitHub repository secrets

            _Auto-generated by [auto-translate.yml](.github/workflows/auto-translate.yml)_
          labels: content,translations,automated
