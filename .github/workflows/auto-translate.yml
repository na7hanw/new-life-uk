name: Auto-Translate Content

on:
  push:
    branches: [main]
    paths:
      - 'nluk/src/data/guides.ts'
  workflow_dispatch:
    inputs:
      langs:
        description: 'Languages to translate (comma-separated, e.g. ar,fr,pl). Leave blank for all.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (print only, no commit)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Translate missing content
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nluk/package-lock.json

      - name: Install dependencies
        working-directory: nluk
        run: npm ci

      - name: Run auto-translate
        working-directory: nluk
        env:
          # Provider A: LibreTranslate / Argos Translate (free, no API key required)
          # Override with a self-hosted instance for better rate limits:
          LIBRE_TRANSLATE_ENDPOINT: ${{ vars.LIBRE_TRANSLATE_ENDPOINT || 'https://translate.argosopentech.com' }}
          # Provider B: NLLB-200 self-hosted endpoint (required for: am, ti, so, om, ur)
          # Must be a self-hosted open-source NLLB service. Not set by default.
          NLLB_ENDPOINT: ${{ secrets.NLLB_ENDPOINT || '' }}
          TRANSLATE_LANGS: ${{ github.event.inputs.langs || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node --experimental-vm-modules scripts/auto-translate.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet nluk/src/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request with translations
        if: steps.changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'i18n: auto-translate missing guide translations'
          branch: 'auto-translate/update-translations'
          delete-branch: true
          title: '🌍 Auto-translate: fill in missing language translations'
          body: |
            ## Automated Translation Update

            This PR was generated automatically by the [Auto-Translate workflow](.github/workflows/auto-translate.yml).

            ### Translation providers used
            - **LibreTranslate / Argos Translate** (free, open-source, no API key) — Arabic, Persian, French, Polish, Romanian, Ukrainian + more
            - **NLLB-200** (self-hosted, free, open-source) — Amharic, Tigrinya, Somali, Oromo, Urdu (only if `NLLB_ENDPOINT` secret is configured)

            ### ⚠ Machine translation disclaimer
            All translations are **machine-generated using free/open-source models** and may contain errors.
            These translations must not be relied upon for legal, immigration, financial, or official decisions without verification against the official English source.
            NLLB-200 is a research model and is not a certified or legally authoritative translation system.

            ### Languages
            All 11 non-English languages supported by the app:
            Arabic · Persian · Urdu · Amharic · Tigrinya · Somali · Oromo · Ukrainian · Romanian · Polish · French

            > **Note:** Urdu, Amharic, Tigrinya, Somali, and Oromo require a self-hosted NLLB-200 endpoint (`NLLB_ENDPOINT` repository secret).
            > To set up a free self-hosted NLLB service, see the [NLLB-200 model card](https://huggingface.co/facebook/nllb-200-distilled-600M).

            ### No commercial APIs
            This workflow does **not** use Google Cloud Translation, Azure Translator, or DeepL.
            All translation is performed by free/open-source tools.

            ### Review guidance
            - Machine translations are a starting point and should ideally be reviewed by native speakers
            - The [i18n-check workflow](/.github/workflows/i18n-check.yml) ensures all guides have complete English content
            - To improve a translation, edit the relevant string in `guides.ts` and submit a new PR

            _Auto-generated by [auto-translate.yml](.github/workflows/auto-translate.yml)_
          labels: content,translations,automated
