name: PR Size Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  size-check:
    name: Warn on large PRs
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check PR size and warn if large
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const totalLines = pr.additions + pr.deletions;
            const changedFiles = pr.changed_files;

            const overLines = totalLines > 400;
            const overFiles = changedFiles > 25;

            if (!overLines && !overFiles) {
              console.log(`✅ PR size OK: ${totalLines} lines changed across ${changedFiles} files.`);
              return;
            }

            const warnings = [];
            if (overLines) warnings.push(`**${totalLines} lines changed** (limit: 400)`);
            if (overFiles) warnings.push(`**${changedFiles} files modified** (limit: 25)`);

            const body = [
              '⚠️ **Large PR Warning**',
              '',
              `This PR changes ${warnings.join(' and ')}.`,
              '',
              'Large PRs are harder to review and more likely to introduce regressions.',
              'Please consider splitting this into smaller, focused pull requests if possible.',
              '',
              '_This is a warning only — CI will not be blocked._',
            ].join('\n');

            // Only post if no existing warning comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Large PR Warning')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
