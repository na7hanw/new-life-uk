name: i18n Completeness Check

on:
  push:
    branches: [main]
    paths:
      - 'nluk/src/data/guides.js'
  pull_request:
    branches: [main]
    paths:
      - 'nluk/src/data/guides.js'

jobs:
  check:
    name: Check all guide translations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Validate i18n completeness
        working-directory: nluk
        run: |
          node --input-type=module <<'EOF'
          import { GUIDE_MAP } from './src/data/guides.js';

          const LANGS = ['en','ar','fa','ur','am','ti','so','om','uk','ro','pl','fr'];
          const REQUIRED = ['title','summary','steps'];
          let failures = [];

          for (const [id, guide] of Object.entries(GUIDE_MAP)) {
            const content = guide.content || {};
            const en = content.en || {};
            // Every guide must have full English content
            for (const field of REQUIRED) {
              if (!en[field] || (Array.isArray(en[field]) && en[field].length === 0)) {
                failures.push(`[FAIL] ${id}: missing English field '${field}'`);
              }
            }
            // Warn (non-blocking) if non-English translation is empty
            for (const lang of LANGS.filter(l => l !== 'en')) {
              const lc = content[lang] || {};
              if (!lc.title) {
                console.log(`[WARN] ${id}: no '${lang}' translation (title missing)`);
              }
            }
          }

          if (failures.length > 0) {
            console.error('\nFAILURES:');
            failures.forEach(f => console.error(f));
            process.exit(1);
          }

          console.log(`✅ All ${Object.keys(GUIDE_MAP).length} guides have complete English content.`);
          EOF
