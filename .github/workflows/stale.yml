name: Mark Stale Issues and PRs

on:
  schedule:
    # Run daily at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  stale:
    name: Stale bot
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had
            no activity for 60 days. It will be closed in 14 days unless there
            is further activity. Thank you for contributing to New Life UK.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for 30 days. It will be closed in 14 days unless
            there is further activity.
          close-issue-message: >
            This issue was closed automatically after 14 days of no activity
            following the stale label. Please reopen if this is still relevant.
          close-pr-message: >
            This pull request was closed automatically after 14 days of no
            activity following the stale label. Please reopen if still relevant.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,safety-critical'
          exempt-pr-labels: 'pinned,security,safety-critical'
