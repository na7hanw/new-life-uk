name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nluk/package-lock.json

      - name: Install dependencies
        working-directory: nluk
        run: npm ci

      - name: Lint (ESLint + jsx-a11y accessibility rules)
        working-directory: nluk
        run: npm run lint

      - name: Type check (TypeScript — active after PR #28 merges)
        working-directory: nluk
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "No tsconfig.json found — skipping TypeScript type check"
          fi

      - name: Run tests (content integrity + schema validation)
        working-directory: nluk
        run: npm test

      - name: Build
        working-directory: nluk
        run: npm run build

      - name: Security audit (high+)
        working-directory: nluk
        run: npm audit --audit-level=high

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: nluk/dist
          retention-days: 7
