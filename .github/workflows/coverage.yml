name: Test Coverage

on:
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Report test coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nluk/package-lock.json

      - name: Install dependencies
        working-directory: nluk
        run: npm ci

      - name: Run tests with coverage
        working-directory: nluk
        run: npx vitest run --coverage --coverage.reporter=json-summary --coverage.reporter=text

      - name: Post coverage comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'nluk/coverage/coverage-summary.json';

            if (!fs.existsSync(path)) {
              console.log('No coverage summary found, skipping comment.');
              return;
            }

            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            const total = summary.total;

            const pct = (key) => {
              const v = total[key];
              const p = v.pct.toFixed(1);
              const emoji = v.pct >= 80 ? '✅' : v.pct >= 60 ? '⚠️' : '❌';
              return `${emoji} **${p}%** (${v.covered}/${v.total})`;
            };

            const body = [
              '## 📊 Test Coverage',
              '',
              '| Category | Coverage |',
              '|----------|----------|',
              `| Statements | ${pct('statements')} |`,
              `| Branches   | ${pct('branches')} |`,
              `| Functions  | ${pct('functions')} |`,
              `| Lines      | ${pct('lines')} |`,
              '',
              '_Generated by [coverage.yml](.github/workflows/coverage.yml)_',
            ].join('\n');

            // Find and update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('📊 Test Coverage')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
