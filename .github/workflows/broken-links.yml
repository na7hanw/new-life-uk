name: Broken Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --config .lychee.toml
            --verbose
            --no-progress
            **/*.md
            .github/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
