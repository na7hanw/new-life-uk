name: Broken Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nluk/package-lock.json

      - name: Install and build
        working-directory: nluk
        run: npm ci && npm run build

      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --config .lychee.toml
            --verbose
            --no-progress
            '**/*.md'
            '.github/**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check links in built HTML
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --config .lychee.toml
            --verbose
            --no-progress
            './nluk/dist/**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
