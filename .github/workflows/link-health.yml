name: Data Link Health Check

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 07:00 UTC
  workflow_dispatch:        # Run manually any time from GitHub Actions tab

jobs:
  check:
    name: Check all URLs in data files
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extract and verify URLs
        id: check
        run: |
          set +e

          # Scan all TypeScript data files for https URLs, capturing file:line context.
          # Output format from grep -nHoE: "file:lineno:https://..."
          # We use sed to rewrite to "file TAB lineno TAB url" so the URL (which
          # contains its own colons) is preserved as a single tab-delimited field.
          LOCATION_RAW=$(grep -nHoE 'https://[^"[:space:]]+' \
            nluk/src/data/jobs.ts \
            nluk/src/data/guides.ts \
            nluk/src/data/saves.ts \
            nluk/src/data/apps.ts \
            nluk/src/data/culture.ts \
            nluk/src/data/emergency.ts \
            nluk/src/data/immigration-updates.ts \
            2>/dev/null | \
            sed 's/\([^:]*\):\([0-9]*\):\(.*\)/\1\t\2\t\3/')

          # Unique URLs only (for checking — avoids redundant requests)
          URLS=$(echo "$LOCATION_RAW" | cut -f3 | sort -u)

          BROKEN=""
          CHECKED=0

          for url in $URLS; do
            CHECKED=$((CHECKED + 1))
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -L --max-redirs 5 --connect-timeout 12 --max-time 20 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml" \
              "$url" 2>/dev/null)

            # Only flag definitive failures (404 Gone, 410 Deleted).
            # Ignore 000/timeout — many legit sites block automated checks.
            if [ "$CODE" = "404" ] || [ "$CODE" = "410" ]; then
              # Find all file:line locations for this URL (plain text, no nested backticks)
              LOCS=$(echo "$LOCATION_RAW" | awk -F'\t' -v u="$url" '$3==u {print $1 ":" $2}' | paste -sd ', ' -)
              BROKEN="$BROKEN\n| $CODE | \`$url\` | $LOCS |"
            fi
          done

          echo "checked=$CHECKED" >> "$GITHUB_OUTPUT"

          if [ -n "$BROKEN" ]; then
            echo "found_broken=true" >> "$GITHUB_OUTPUT"
            {
              echo "broken_list<<ENDOFLIST"
              printf "%b" "$BROKEN"
              echo ""
              echo "ENDOFLIST"
            } >> "$GITHUB_OUTPUT"
          else
            echo "found_broken=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Close previous broken-link issues
        if: steps.check.outputs.found_broken == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'broken-links',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Open issue for broken links
        if: steps.check.outputs.found_broken == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const checked = '${{ steps.check.outputs.checked }}';
            const broken = `${{ steps.check.outputs.broken_list }}`;

            const dataFiles = [
              'nluk/src/data/jobs.ts',
              'nluk/src/data/guides.ts',
              'nluk/src/data/saves.ts',
              'nluk/src/data/apps.ts',
              'nluk/src/data/culture.ts',
              'nluk/src/data/emergency.ts',
              'nluk/src/data/immigration-updates.ts',
            ].map(f => `\`${f}\``).join(', ');

            const body = [
              `## 🔗 Broken Links Detected`,
              ``,
              `The daily link health check scanned **${checked} unique URLs** across ${dataFiles} and found the following returning **404 / 410**:`,
              ``,
              `| Code | URL | Location (file:line) |`,
              `|------|-----|----------------------|`,
              broken,
              ``,
              `### How to fix`,
              `1. Open the file listed in the **Location** column`,
              `2. Jump to the line number shown`,
              `3. Replace the broken URL with the updated one`,
              `4. Commit and push — Cloudflare Pages will redeploy automatically`,
              ``,
              `_Auto-generated ${today} by the [Data Link Health Check](.github/workflows/link-health.yml) workflow._`,
              `_A new issue replaces this one on the next daily run if links remain broken._`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔗 Broken links in data files — ${today}`,
              body,
              labels: ['content', 'bug', 'broken-links'],
            });

      - name: All links healthy
        if: steps.check.outputs.found_broken == 'false'
        run: |
          echo "✅ All ${{ steps.check.outputs.checked }} URLs checked — none returned 404 or 410."
