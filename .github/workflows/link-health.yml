name: Data Link Health Check

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC
  workflow_dispatch:        # Run manually any time from GitHub Actions tab

jobs:
  check:
    name: Check all URLs in data files
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Extract and verify URLs
        id: check
        run: |
          set +e

          # Extract every https URL from the data files
          URLS=$(grep -ohE 'https://[^"]+' \
            nluk/src/data/jobs.js \
            nluk/src/data/guides.js \
            2>/dev/null | sort -u)

          BROKEN=""
          CHECKED=0

          for url in $URLS; do
            CHECKED=$((CHECKED + 1))
            CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -L --max-redirs 5 --connect-timeout 12 --max-time 20 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml" \
              "$url" 2>/dev/null)

            # Only flag definitive failures (404 Gone, 410 Deleted)
            # Ignore 000/timeout — many legit sites block automated checks
            if [ "$CODE" = "404" ] || [ "$CODE" = "410" ]; then
              BROKEN="$BROKEN\n| $CODE | $url |"
            fi
          done

          echo "checked=$CHECKED" >> "$GITHUB_OUTPUT"

          if [ -n "$BROKEN" ]; then
            echo "found_broken=true" >> "$GITHUB_OUTPUT"
            {
              echo "broken_list<<ENDOFLIST"
              printf "%b" "$BROKEN"
              echo ""
              echo "ENDOFLIST"
            } >> "$GITHUB_OUTPUT"
          else
            echo "found_broken=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Close previous broken-link issues
        if: steps.check.outputs.found_broken == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'broken-links',
              state: 'open',
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Open issue for broken links
        if: steps.check.outputs.found_broken == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const checked = '${{ steps.check.outputs.checked }}';
            const broken = `${{ steps.check.outputs.broken_list }}`;

            const body = [
              `## 🔗 Broken Links Detected`,
              ``,
              `The weekly link health check scanned **${checked} URLs** across \`nluk/src/data/jobs.js\` and \`nluk/src/data/guides.js\` and found the following returning **404 / 410**:`,
              ``,
              `| Code | URL |`,
              `|------|-----|`,
              broken,
              ``,
              `### How to fix`,
              `1. Find the updated URL for each broken link`,
              `2. Edit the URL directly in the data file`,
              `3. Commit and push — Netlify will redeploy automatically`,
              ``,
              `_Auto-generated ${today} by the [Data Link Health Check](.github/workflows/link-health.yml) workflow._`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔗 Broken links in data files — ${today}`,
              body,
              labels: ['content', 'bug', 'broken-links'],
            });

      - name: All links healthy
        if: steps.check.outputs.found_broken == 'false'
        run: |
          echo "✅ All ${{ steps.check.outputs.checked }} URLs checked — none returned 404 or 410."
