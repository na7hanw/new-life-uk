# Netlify build configuration for New Life UK
# App lives in the nluk/ subdirectory (Vite + React PWA)

[build]
  base    = "nluk"
  command = "npm run build"
  publish = "dist"

# SPA routing — send all paths to index.html so React Router (or tab state)
# works correctly on direct URL access and page refresh
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  # VITE_SENTRY_DSN will be injected from Netlify environment variables (set in Site Settings)
  # if not defined, Sentry monitoring will be disabled gracefully

# Content Security Policy — technically enforces the privacy promise
# (no data can be sent to any external server)
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.ingest.sentry.io; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';"
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache headers for static assets produced by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type  = "application/manifest+json"
