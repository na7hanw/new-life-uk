# Netlify build configuration for New Life UK
# App lives in the nluk/ subdirectory (Vite + React PWA)

[build]
  base    = "nluk"
  command = "npm run build"
  publish = "dist"

# SPA routing — send all paths to index.html so React Router (or tab state)
# works correctly on direct URL access and page refresh
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Cache headers for static assets produced by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type  = "application/manifest+json"
