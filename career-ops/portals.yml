# -- Search queries for UK job boards --

search_queries:
  # NHS Jobs
  - name: NHS Jobs — Housing & Admin
    query: 'site:jobs.nhs.uk "Housing Officer" OR "Administrator" OR "Business Support" OR "Data Analyst"'
    enabled: true

  - name: NHS Jobs — Healthcare Admin Band 2-4
    query: 'site:jobs.nhs.uk "Band 2" OR "Band 3" OR "Band 4" "administrator" OR "receptionist" OR "clerk" OR "support worker"'
    enabled: true

  - name: NHS Jobs — Interpreter & Language Support
    query: 'site:jobs.nhs.uk "interpreter" OR "Amharic" OR "Tigrinya" OR "language support" OR "bilingual"'
    enabled: true

  # Indeed UK
  - name: Indeed UK — Housing Officer
    query: 'site:uk.indeed.com "Housing Officer" OR "Housing Support Worker" OR "Tenancy Officer" UK'
    enabled: true

  - name: Indeed UK — Admin & Business Support
    query: 'site:uk.indeed.com "Business Support Officer" OR "Administrator" OR "Office Administrator" council OR housing OR NHS'
    enabled: true

  - name: Indeed UK — Data Analyst Entry
    query: 'site:uk.indeed.com "Data Analyst" entry level OR junior OR graduate UK "£22" OR "£24" OR "£26"'
    enabled: true

  - name: Indeed UK — Interpreter Amharic Tigrinya
    query: 'site:uk.indeed.com "Amharic" OR "Tigrinya" interpreter OR translator OR "language support"'
    enabled: true

  - name: Indeed UK — HGV Driver
    query: 'site:uk.indeed.com "HGV Driver" OR "LGV Driver" Class 1 OR Class 2 UK'
    enabled: true

  - name: Indeed UK — Train Driver Trainee
    query: 'site:uk.indeed.com "Train Driver" OR "Trainee Train Driver" OR "Driver Manager Trainee" UK'
    enabled: true

  # Reed UK
  - name: Reed — Housing & Council Jobs
    query: 'site:reed.co.uk "Housing Officer" OR "Housing Support" OR "Tenancy Officer" council OR housing association'
    enabled: true

  - name: Reed — Admin & Business Support
    query: 'site:reed.co.uk "Administrator" OR "Business Support" OR "Office Administrator" public sector OR council OR NHS'
    enabled: true

  - name: Reed — Data Analyst UK
    query: 'site:reed.co.uk "Data Analyst" entry OR junior OR graduate UK'
    enabled: true

  # CV-Library
  - name: CV-Library — Housing Jobs
    query: 'site:cv-library.co.uk "Housing Officer" OR "Housing Support Worker" OR "Allocations Officer" UK'
    enabled: true

  - name: CV-Library — Admin Public Sector
    query: 'site:cv-library.co.uk "Administrator" "public sector" OR council OR NHS OR "housing association"'
    enabled: true

  # Totaljobs
  - name: Totaljobs — Housing & Admin
    query: 'site:totaljobs.com "Housing Officer" OR "Housing Support" OR "Business Support Officer" UK'
    enabled: true

  - name: Totaljobs — Interpreter UK
    query: 'site:totaljobs.com "interpreter" OR "translator" Amharic OR Tigrinya OR "community language" UK'
    enabled: true

  # Guardian Jobs (public sector)
  - name: Guardian Jobs — Public Sector
    query: 'site:jobs.theguardian.com "Housing Officer" OR "Data Analyst" OR "Business Support" council OR NHS'
    enabled: true

  # Local Government Jobs
  - name: LG Jobs — Council Roles
    query: 'site:lgjobs.com "Housing Officer" OR "Housing Support" OR "Administrator" OR "Business Support Officer"'
    enabled: true

  # Train Operating Companies
  - name: TOC Jobs — Train Driver
    query: '"Trainee Train Driver" OR "Train Operator Trainee" site:jobs.nationalrail.co.uk OR site:avantitravels.co.uk OR site:tpexpress.co.uk OR site:crosscountrytrains.co.uk'
    enabled: true

  # Trades
  - name: Indeed — Gas Engineer Apprentice
    query: 'site:uk.indeed.com "Gas Engineer" OR "Heating Engineer" apprentice OR trainee OR entry UK'
    enabled: true

  - name: Indeed — Electrical Apprentice
    query: 'site:uk.indeed.com "Electrical Apprentice" OR "Electrician Apprentice" level 3 OR "AM2" UK'
    enabled: true

